<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="app-version" content="6.1">
  <title>提词器</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: #12161b;
      --panel-2: #1d232b;
      --panel-3: #171d23;
      --text: #f4f7fa;
      --muted: #aab4c0;
      --line: #2a323c;
      --accent: #38c98f;
      --accent-2: #80caff;
      --danger: #ff7373;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: minmax(0, 1fr) var(--control-height, clamp(92px, 12vh, 112px));
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .app.fullscreen-mode {
      grid-template-rows: minmax(0, 1fr) var(--control-height, clamp(92px, 12vh, 112px));
    }

    .app.fullscreen-fallback {
      position: fixed;
      inset: 0;
      z-index: 50;
    }

    .app.fullscreen-mode.controls-collapsed {
      grid-template-rows: minmax(0, 1fr) 36px;
    }

    body.output-mode .app {
      grid-template-rows: minmax(0, 1fr);
    }

    body.output-mode .control-panel,
    body.output-mode .drop-zone,
    body.output-mode .floating-tooltip,
    body.output-mode .stage-progress {
      display: none;
    }

    body.output-mode .empty-actions {
      display: none;
    }

    body.output-mode .stage {
      background: var(--prompter-bg, #020303);
    }

    .stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      color: var(--prompter-text, #fff);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, .05);
    }

    .preview-surface {
      position: relative;
      flex: 0 0 auto;
      width: var(--preview-base-width, 1280px);
      height: var(--preview-base-height, 720px);
      overflow: hidden;
      background: var(--prompter-bg, #020303);
      color: var(--prompter-text, #fff);
      transform: scale(var(--preview-scale, 1));
      transform-origin: center;
    }

    body.display-light {
      --prompter-bg: #fff;
      --prompter-text: #050607;
      --prompter-fade: #fff;
      --prompter-fade-transparent: rgba(255, 255, 255, 0);
      --prompter-shadow: none;
      color-scheme: light;
    }

    body.display-dark {
      --prompter-bg: #020303;
      --prompter-text: #fff;
      --prompter-fade: #020303;
      --prompter-fade-transparent: rgba(2, 3, 3, 0);
      --prompter-shadow: 0 2px 18px rgba(0, 0, 0, .86);
      color-scheme: dark;
    }

    .guide {
      position: absolute;
      left: 0;
      right: 0;
      top: var(--guide-top, 50%);
      height: 2px;
      transform: translateY(-1px);
      background: rgba(56, 201, 143, .78);
      box-shadow: 0 0 18px rgba(56, 201, 143, .48);
      z-index: 2;
      pointer-events: none;
    }

    .guide-progress-dot {
      position: absolute;
      left: var(--guide-progress, 0%);
      top: 50%;
      display: none;
      width: 15px;
      height: 15px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 255, 255, .9);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(56, 201, 143, .75);
    }

    body.output-mode .guide-progress-dot {
      display: block;
    }

    .empty-state {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 3;
      display: none;
      width: min(520px, calc(100vw - 48px));
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .empty-title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 820;
    }

    .empty-copy {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      pointer-events: auto;
    }

    body.empty-script .empty-state {
      display: block;
    }

    body.empty-script .script {
      opacity: 0;
    }

    .fade {
      display: none;
    }

    .script {
      position: absolute;
      left: 8%;
      right: 8%;
      top: var(--guide-top, 50%);
      white-space: pre-wrap;
      color: var(--prompter-text, #fff);
      font-size: var(--script-size, 64px);
      line-height: var(--script-line-height, 1.42);
      font-weight: 780;
      letter-spacing: var(--script-spacing, 0px);
      text-align: center;
      overflow-wrap: anywhere;
      transform: translateX(var(--script-offset-x, 0vw)) translateY(var(--scroll-y, 0px)) scaleX(var(--mirror-x, 1)) scaleY(var(--mirror-y, 1));
      will-change: transform;
      text-shadow: var(--prompter-shadow, 0 2px 18px rgba(0, 0, 0, .86));
    }

    .stage-progress {
      position: absolute;
      right: 16px;
      top: 50%;
      z-index: 4;
      display: grid;
      grid-template-rows: auto minmax(180px, 36vh) auto;
      gap: 8px;
      align-items: center;
      justify-items: center;
      transform: translateY(-50%);
      padding: 12px 8px;
      border: 1px solid rgba(128, 202, 255, .22);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(7, 11, 15, .7);
      backdrop-filter: blur(10px);
    }

    .output-remaining {
      position: absolute;
      left: 50%;
      top: 18px;
      z-index: 4;
      display: none;
      padding: 16px 24px;
      border: 1px solid rgba(128, 202, 255, .24);
      border-radius: 8px;
      color: rgba(244, 247, 250, .86);
      background: rgba(7, 11, 15, .66);
      font-size: 44px;
      font-weight: 760;
      line-height: 1;
      backdrop-filter: blur(10px);
      transform: translateX(-50%) scaleX(var(--mirror-x, 1)) scaleY(var(--mirror-y, 1));
    }

      body.output-mode .output-remaining {
        display: block;
      }

      body.output-mode .output-remaining.mirrored-y {
        top: auto;
        bottom: 18px;
      }

    body.display-light .output-remaining {
      border-color: rgba(0, 0, 0, .16);
      color: rgba(5, 6, 7, .78);
      background: rgba(255, 255, 255, .76);
    }

    .stage-progress-label {
      writing-mode: vertical-rl;
      color: rgba(244, 247, 250, .78);
      font-size: 11px;
      line-height: 1;
    }

    .stage-progress input[type="range"] {
      width: 28px;
      height: 100%;
      margin: 0;
      writing-mode: vertical-rl;
      direction: rtl;
      accent-color: var(--accent-2);
    }

    .stage-progress .value {
      min-width: 34px;
      text-align: center;
    }

    body.display-light .stage-progress {
      border-color: rgba(0, 0, 0, .16);
      background: rgba(255, 255, 255, .72);
    }

    body.display-light .stage-progress-label {
      color: rgba(5, 6, 7, .72);
    }

    .control-panel {
      position: relative;
      display: grid;
      grid-template-rows: 1fr;
      min-height: 0;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(19, 24, 30, .98), rgba(11, 14, 18, .98));
      z-index: 5;
      overflow: visible;
      transition: opacity .16s ease;
    }

    .control-main {
      display: grid;
      grid-template-columns: minmax(280px, .95fr) minmax(240px, .78fr) minmax(520px, 1.9fr);
      gap: 10px;
      align-items: stretch;
      padding: 8px 10px;
      min-width: 0;
      overflow-y: auto;
      transition: opacity .16s ease, transform .16s ease;
    }

    .control-section {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 6px;
      min-width: 0;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, .065);
      border-radius: 8px;
      background: rgba(255, 255, 255, .025);
    }

    .section-title {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .playback-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .output-display-picker {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      min-width: 0;
      font-size: 11px;
      white-space: nowrap;
    }

    .output-display-picker[hidden] {
      display: none;
    }

    .output-display-picker select {
      min-width: 0;
      width: min(180px, 18vw);
      height: 24px;
      padding: 0 24px 0 7px;
      border: 1px solid rgba(128, 202, 255, .22);
      border-radius: 5px;
      color: var(--text);
      background: #151b22;
      font: inherit;
      cursor: pointer;
    }

    .output-display-picker select:focus-visible {
      outline: 2px solid rgba(128, 202, 255, .56);
      outline-offset: 1px;
    }

    .quick-controls,
    .display-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .quick-controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .quick-controls .button {
      width: 100%;
    }

    .display-actions .button {
      width: 100%;
    }

    .slider-groups {
      display: grid;
      grid-template-columns: minmax(260px, 1.35fr) minmax(180px, .9fr);
      gap: 6px;
      min-width: 0;
      align-items: stretch;
    }

    .control-group {
      display: grid;
      grid-template-columns: repeat(var(--cols, 1), minmax(72px, 1fr));
      gap: 6px;
      align-items: center;
      min-width: 0;
      padding: 5px 7px;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 8px;
      background: rgba(0, 0, 0, .12);
    }

    .group-title {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      color: var(--muted);
      font-size: 11px;
    }

    .progress-track {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent-2);
    }

    .shortcut-hint {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .app.fullscreen-mode.controls-collapsed .control-main {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    .resize-handle {
      position: absolute;
      left: 0;
      right: 0;
      top: -8px;
      height: 15px;
      display: grid;
      place-items: center;
      border: 0;
      padding: 0;
      color: rgba(244, 247, 250, .66);
      background: transparent;
      cursor: ns-resize;
      z-index: 7;
      touch-action: none;
    }

    .resize-handle::before {
      content: "";
      width: 72px;
      height: 5px;
      border-radius: 999px;
      background: rgba(128, 202, 255, .28);
      box-shadow: 0 0 0 1px rgba(128, 202, 255, .16);
    }

    .resize-handle:hover::before,
    .resize-handle:focus-visible::before,
    body.resizing-controls .resize-handle::before {
      background: rgba(128, 202, 255, .62);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .transport,
    .toggle-group,
    .file-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .value {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .button {
      display: inline-grid;
      grid-auto-flow: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid #3a4350;
      border-radius: 8px;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .button:hover {
      border-color: #566474;
      background: #262e38;
    }

    .button.primary {
      border-color: rgba(56, 201, 143, .46);
      color: #06110d;
      background: var(--accent);
      font-weight: 780;
    }

    .button.danger {
      border-color: rgba(255, 115, 115, .42);
      color: #ffe2e2;
      background: rgba(255, 115, 115, .12);
    }

    .button.icon-only {
      width: 38px;
      padding: 0;
    }

    .button.output-button {
      min-width: 0;
      min-height: 44px;
      padding: 0 16px;
      border-color: rgba(128, 202, 255, .5);
      color: #e9f6ff;
      background: rgba(128, 202, 255, .12);
      font-weight: 760;
    }

    .button span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .button.output-button[aria-pressed="true"] {
      color: #06110d;
      border-color: rgba(56, 201, 143, .58);
      background: var(--accent);
    }

    .button.icon-only[aria-label] {
      position: relative;
    }

    .button.icon-only[aria-label]::after {
      content: attr(aria-label);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 9px);
      z-index: 30;
      width: max-content;
      max-width: 160px;
      padding: 6px 8px;
      border: 1px solid rgba(128, 202, 255, .32);
      border-radius: 6px;
      color: #edf7ff;
      background: rgba(7, 11, 15, .96);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .34);
      font-size: 12px;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 4px);
      transition: opacity .12s ease, transform .12s ease;
      white-space: nowrap;
    }

    .button.icon-only[aria-label]::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      z-index: 31;
      width: 8px;
      height: 8px;
      border-right: 1px solid rgba(128, 202, 255, .32);
      border-bottom: 1px solid rgba(128, 202, 255, .32);
      background: rgba(7, 11, 15, .96);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 4px) rotate(45deg);
      transition: opacity .12s ease, transform .12s ease;
    }

    .button.icon-only[aria-label]:hover::after,
    .button.icon-only[aria-label]:focus-visible::after,
    .button.icon-only[aria-label]:hover::before,
    .button.icon-only[aria-label]:focus-visible::before {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .toggle[aria-pressed="true"],
    .button[aria-expanded="true"] {
      border-color: rgba(128, 202, 255, .62);
      color: #e4f4ff;
      background: rgba(128, 202, 255, .16);
    }

    .mirror-note {
      min-height: 16px;
      color: var(--accent-2);
      font-size: 11px;
      line-height: 1.25;
    }

    .script-drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 100%;
      display: grid;
      grid-template-rows: 0fr;
      height: 0;
      overflow: hidden;
      transition: height .2s ease, grid-template-rows .2s ease;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 -22px 70px rgba(0, 0, 0, .38);
    }

    .script-drawer.open {
      grid-template-rows: 1fr;
      height: min(52vh, 480px);
    }

    .drawer-inner {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    .drawer-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .drawer-note {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-title {
      color: var(--text);
      font-weight: 760;
    }

    .drawer-metric {
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 0;
      padding: 18px 20px;
      border: 0;
      outline: 0;
      resize: none;
      color: var(--text);
      background: #090d11;
      line-height: 1.72;
      font-size: 16px;
    }

    input[type="file"] {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .drop-zone {
      position: fixed;
      inset: 16px;
      display: grid;
      place-items: center;
      border: 2px dashed rgba(128, 202, 255, .66);
      border-radius: 12px;
      color: #e4f4ff;
      background: rgba(2, 6, 10, .76);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity .14s ease;
      backdrop-filter: blur(6px);
      font-size: 20px;
      font-weight: 760;
    }

    .drop-zone.visible {
      opacity: 1;
    }

    .floating-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 80;
      width: max-content;
      max-width: 180px;
      padding: 7px 9px;
      border: 1px solid rgba(128, 202, 255, .32);
      border-radius: 6px;
      color: #edf7ff;
      background: rgba(7, 11, 15, .97);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .36);
      font-size: 12px;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -4px);
      transition: opacity .12s ease, transform .12s ease;
      white-space: nowrap;
    }

    .floating-tooltip.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .status-toast {
      position: fixed;
      top: 14px;
      left: 50%;
      z-index: 90;
      max-width: min(520px, calc(100vw - 28px));
      padding: 9px 12px;
      border: 1px solid rgba(128, 202, 255, .32);
      border-radius: 6px;
      color: #edf7ff;
      background: rgba(7, 11, 15, .97);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .36);
      font-size: 12px;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -8px);
      transition: opacity .16s ease, transform .16s ease;
    }

    .status-toast.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    kbd {
      padding: 2px 6px;
      border: 1px solid #404854;
      border-bottom-color: #2b313a;
      border-radius: 5px;
      color: #dce4ee;
      background: #11151a;
      font-size: 12px;
    }

    .stage.fullscreen {
      width: 100vw;
      height: 100vh;
    }

    .app.fullscreen-mode .script {
      left: 10vw;
      right: 10vw;
    }

    @media (max-width: 1120px) {
      .app {
        grid-template-rows: minmax(0, 1fr) var(--control-height, clamp(104px, 14vh, 132px));
      }

      .control-main {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .quick-controls {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .display-actions {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .slider-groups {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .control-group {
        grid-template-columns: repeat(var(--cols), minmax(70px, 1fr));
      }

      .field {
        grid-column: span 1;
      }
    }

    @media (max-width: 720px) {
      .app {
        grid-template-rows: minmax(0, 1fr) var(--control-height, clamp(126px, 19vh, 164px));
      }

      .control-main {
        grid-template-columns: 1fr;
      }

      .quick-controls,
      .slider-groups,
      .control-section {
        grid-column: 1 / -1;
      }

      .quick-controls {
        align-items: flex-start;
        grid-template-columns: 1fr 1fr;
      }

      .display-actions {
        grid-template-columns: 1fr 1fr;
      }

      .slider-groups {
        grid-template-columns: 1fr;
      }

      .control-group {
        grid-template-columns: 1fr 1fr;
      }

      .script {
        left: 6%;
        right: 6%;
      }

      .stage-progress {
        right: 8px;
        grid-template-rows: auto minmax(150px, 32vh) auto;
      }
    }

    /* 网页预览版（非桌面端，无原生桥）：隐藏第二屏输出按钮、显示顶部提示条 */
    .web-banner {
      display: none;
    }

    body.web-preview .web-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 12px;
      color: var(--muted);
      background: rgba(7, 11, 15, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      font-size: 12px;
      line-height: 1;
    }

    body.web-preview .web-banner a {
      color: var(--accent-2);
      text-decoration: none;
      white-space: nowrap;
    }

    body.web-preview .web-banner a:hover {
      text-decoration: underline;
    }

    body.web-preview .web-banner .dot-sep {
      color: var(--line);
    }

    /* 预留顶部空间，避免 banner 遮挡提词画面 */
    body.web-preview .app {
      padding-top: 30px;
    }

    /* 浏览器无法跨窗口输出第二屏，隐藏输出按钮和显示器选择器 */
    body.web-preview .button.output-button,
    body.web-preview .output-display-picker {
      display: none;
    }

    @media (max-width: 720px) {
      body.web-preview .app {
        padding-top: 34px;
      }

      body.web-preview .web-banner {
        font-size: 11px;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="web-banner" id="webBanner" aria-hidden="true">
    <span>网页预览版（仅单屏）</span>
    <span class="dot-sep">·</span>
    <a href="https://github.com/BeetMan/teleprompter" target="_blank" rel="noopener">下载桌面版支持双屏输出</a>
  </div>
  <div class="app">
    <main class="stage" id="stage" tabindex="0" aria-label="提词器预览">
      <div class="preview-surface" id="previewSurface">
      <div class="guide" aria-hidden="true">
        <div class="guide-progress-dot" id="guideProgressDot"></div>
      </div>
      <div class="fade" aria-hidden="true"></div>
      <div class="empty-state" id="emptyState">
        <h1 class="empty-title">准备一段稿件</h1>
        <p class="empty-copy">导入文档或直接输入文字，提词画面会在这里开始滚动。</p>
        <div class="empty-actions">
          <button class="button primary" id="emptyEditButton" type="button">输入稿件</button>
          <button class="button" id="emptyImportButton" type="button">读取文件</button>
        </div>
      </div>
      <div class="script" id="scriptText"></div>
      <div class="output-remaining" id="outputRemaining">剩余 0 字</div>
      <div class="stage-progress" aria-label="浏览进度">
        <span class="stage-progress-label">浏览进度</span>
        <input id="browseRange" type="range" min="0" max="100" value="0" step="1" aria-label="浏览进度">
        <span class="value" id="browseValue">0%</span>
      </div>
      </div>
    </main>

    <section class="control-panel" aria-label="提词控制">
      <button class="resize-handle" id="resizeHandle" type="button" aria-label="调整显示区域高度" title="拖动调整显示区域"></button>
      <div class="control-main">
        <span class="sr-only" id="saveStatus" aria-live="polite">已自动保存</span>

        <div class="control-section">
          <div class="section-title playback-section-title">
            <span>播放</span>
            <label class="output-display-picker" id="outputDisplayPicker" for="outputDisplaySelect" hidden>
              <span>输出到</span>
              <select id="outputDisplaySelect" aria-label="选择输出显示器"></select>
            </label>
          </div>
          <div class="quick-controls">
            <button class="button primary main-action" id="playButton" type="button">
              <svg class="icon" id="playIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M8 5v14l11-7z"></path>
              </svg>
              <span id="playLabel">开始</span>
            </button>
            <button class="button secondary-action" id="resetButton" type="button" title="回到顶部" aria-label="回到顶部">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                <path d="M3 4v6h6"></path>
              </svg>
              <span>回到顶部</span>
            </button>
            <button class="button secondary-action" id="endButton" type="button" title="回到尾部" aria-label="回到尾部">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M4 5h16"></path>
                <path d="M12 5v14"></path>
                <path d="m19 12-7 7-7-7"></path>
              </svg>
              <span>回到尾部</span>
            </button>
            <button class="button output-button main-action" id="outputButton" type="button" title="第二屏输出" aria-label="第二屏输出" aria-pressed="false">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                <path d="M8 20h8"></path>
                <path d="M12 16v4"></path>
              </svg>
              <span id="outputLabel">第二屏输出</span>
            </button>
          </div>
          <div class="control-group" style="--cols: 1">
            <div class="field">
              <label for="speedRange">速度 <span class="value" id="speedValue">40</span></label>
              <input id="speedRange" type="range" min="5" max="240" value="42">
            </div>
            <div class="progress-row" aria-label="稿件进度">
              <div class="progress-track" aria-hidden="true">
                <div class="progress-fill" id="progressFill"></div>
              </div>
              <span class="value" id="progressValue">0%</span>
            </div>
            <div class="shortcut-hint">Space 播放 · R 重置 · F 全屏 · ↑↓ 滚动 · ←→ 速度</div>
          </div>
        </div>

        <div class="control-section">
          <div class="section-title">工具</div>
          <div class="display-actions">
            <button class="button toggle" id="mirrorXButton" type="button" aria-pressed="false" title="水平镜像" aria-label="水平镜像">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M12 3v18"></path>
                <path d="m8 7-5 5 5 5"></path>
                <path d="m16 7 5 5-5 5"></path>
              </svg>
              <span>水平镜像</span>
            </button>
            <button class="button toggle" id="mirrorYButton" type="button" aria-pressed="false" title="垂直镜像" aria-label="垂直镜像">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 12h18"></path>
                <path d="m7 8 5-5 5 5"></path>
                <path d="m7 16 5 5 5-5"></path>
              </svg>
              <span>垂直镜像</span>
            </button>
            <button class="button" id="toggleEditorButton" type="button" aria-expanded="false">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
              </svg>
              <span>稿件</span>
            </button>
            <button class="button" id="importButton" type="button">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="M7 10l5-5 5 5"></path>
                <path d="M12 5v12"></path>
              </svg>
              <span>读取</span>
            </button>
            <input id="fileInput" type="file" accept=".txt,.md,.markdown,.docx,text/plain,text/markdown,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
          </div>
          <div class="mirror-note" id="mirrorNote"></div>
        </div>

        <div class="control-section">
          <div class="section-title">显示</div>
          <div class="slider-groups">
            <div class="control-group" style="--cols: 3">
              <div class="group-title">文字</div>
              <div class="field">
                <label for="sizeRange">字号 <span class="value" id="sizeValue">64</span></label>
                <input id="sizeRange" type="range" min="28" max="128" value="64">
              </div>
              <div class="field">
                <label for="lineRange">行距 <span class="value" id="lineValue">91px</span></label>
                <input id="lineRange" type="range" min="28" max="180" value="91">
              </div>
              <div class="field">
                <label for="spacingRange">字距 <span class="value" id="spacingValue">0</span></label>
                <input id="spacingRange" type="range" min="-4" max="24" value="0" step="0.5">
              </div>
            </div>

            <div class="control-group" style="--cols: 3">
              <div class="group-title">位置</div>
              <div class="field">
                <label for="widthRange">宽度 <span class="value" id="widthValue">84%</span></label>
                <input id="widthRange" type="range" min="54" max="94" value="84">
              </div>
              <div class="field">
                <label for="offsetRange">水平位置 <span class="value" id="offsetValue">0</span></label>
                <input id="offsetRange" type="range" min="-30" max="30" value="0" step="1">
              </div>
              <div class="field">
                <label for="guideRange">指示线位置 <span class="value" id="guideValue">50%</span></label>
                <input id="guideRange" type="range" min="25" max="75" value="50" step="1">
              </div>
              <button class="button toggle" id="darkModeButton" type="button" aria-pressed="true">黑底白字</button>
              <button class="button toggle" id="lightModeButton" type="button" aria-pressed="false">白底黑字</button>
            </div>
          </div>
        </div>
      </div>

      <div class="script-drawer" id="scriptDrawer">
        <div class="drawer-inner">
          <div class="drawer-tools">
            <div class="drawer-note">
              <span class="drawer-title">稿件编辑</span>
              <span class="drawer-metric" id="stats">0 字</span>
              <span class="drawer-metric" id="readingTime">约 0 分钟</span>
            </div>
            <div class="file-actions">
              <span><kbd>Space</kbd> 播放/暂停</span>
              <button class="button" id="closeEditorButton" type="button">关闭</button>
              <button class="button danger" id="clearButton" type="button">清空</button>
            </div>
          </div>
          <textarea id="scriptInput" spellcheck="false">大家好，欢迎来到今天的分享。

这是一段可以直接替换的提词器稿件。

你可以点击“稿件”展开编辑区，或点击“读取”导入 txt、md、docx 文件。

开始后，文字会从中线附近向上滚动。

如果要给手机、平板或反射镜使用，可以打开水平镜像或垂直镜像。

祝录制顺利。</textarea>
        </div>
      </div>
    </section>
    <div class="drop-zone" id="dropZone" aria-hidden="true">松开以读取稿件文件</div>
    <div class="floating-tooltip" id="floatingTooltip" role="tooltip" aria-hidden="true"></div>
    <div class="status-toast" id="statusToast" role="status" aria-live="polite" aria-hidden="true"></div>
  </div>

  <script>
    const elements = {
      app: document.querySelector(".app"),
      input: document.querySelector("#scriptInput"),
      text: document.querySelector("#scriptText"),
      previewSurface: document.querySelector("#previewSurface"),
      guide: document.querySelector(".guide"),
      guideProgressDot: document.querySelector("#guideProgressDot"),
      outputRemaining: document.querySelector("#outputRemaining"),
      emptyState: document.querySelector("#emptyState"),
      emptyEditButton: document.querySelector("#emptyEditButton"),
      emptyImportButton: document.querySelector("#emptyImportButton"),
      stage: document.querySelector("#stage"),
      controlPanel: document.querySelector(".control-panel"),
      controlMain: document.querySelector(".control-main"),
      resizeHandle: document.querySelector("#resizeHandle"),
      playButton: document.querySelector("#playButton"),
      playIcon: document.querySelector("#playIcon"),
      playLabel: document.querySelector("#playLabel"),
      resetButton: document.querySelector("#resetButton"),
      endButton: document.querySelector("#endButton"),
      outputButton: document.querySelector("#outputButton"),
      outputLabel: document.querySelector("#outputLabel"),
      outputDisplayPicker: document.querySelector("#outputDisplayPicker"),
      outputDisplaySelect: document.querySelector("#outputDisplaySelect"),
      clearButton: document.querySelector("#clearButton"),
      closeEditorButton: document.querySelector("#closeEditorButton"),
      saveStatus: document.querySelector("#saveStatus"),
      stats: document.querySelector("#stats"),
      readingTime: document.querySelector("#readingTime"),
      speedRange: document.querySelector("#speedRange"),
      sizeRange: document.querySelector("#sizeRange"),
      lineRange: document.querySelector("#lineRange"),
      spacingRange: document.querySelector("#spacingRange"),
      widthRange: document.querySelector("#widthRange"),
      offsetRange: document.querySelector("#offsetRange"),
      guideRange: document.querySelector("#guideRange"),
      browseRange: document.querySelector("#browseRange"),
      speedValue: document.querySelector("#speedValue"),
      progressFill: document.querySelector("#progressFill"),
      progressValue: document.querySelector("#progressValue"),
      browseValue: document.querySelector("#browseValue"),
      sizeValue: document.querySelector("#sizeValue"),
      lineValue: document.querySelector("#lineValue"),
      spacingValue: document.querySelector("#spacingValue"),
      widthValue: document.querySelector("#widthValue"),
      offsetValue: document.querySelector("#offsetValue"),
      guideValue: document.querySelector("#guideValue"),
      mirrorXButton: document.querySelector("#mirrorXButton"),
      mirrorYButton: document.querySelector("#mirrorYButton"),
      darkModeButton: document.querySelector("#darkModeButton"),
      lightModeButton: document.querySelector("#lightModeButton"),
      mirrorNote: document.querySelector("#mirrorNote"),
      toggleEditorButton: document.querySelector("#toggleEditorButton"),
      scriptDrawer: document.querySelector("#scriptDrawer"),
      importButton: document.querySelector("#importButton"),
      fileInput: document.querySelector("#fileInput"),
      dropZone: document.querySelector("#dropZone"),
      floatingTooltip: document.querySelector("#floatingTooltip"),
      statusToast: document.querySelector("#statusToast")
    };

    const storageKey = "local-teleprompter-state-v2";
    let scrollY = 0;
    let playing = false;
    let mirrorX = 1;
    let mirrorY = 1;
    let displayMode = "dark";
    let dragDepth = 0;
    let fullscreenCollapseTimer = 0;
    let resizing = false;
    let seekingProgress = false;
    let activeTooltipTarget = null;
    const params = new URLSearchParams(window.location.search);
    const isOutputMode = params.get("mode") === "output";
    let applyingRemoteState = false;
    let resizeFrame = 0;
    let outputActive = false;
    let previewBaseWidth = 1280;
    let previewBaseHeight = 720;
    let snapshotRevision = 0;
    let playbackRevision = 0;
    const syncSessionId = globalThis.crypto?.randomUUID?.() || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    let lastSnapshotSignature = "";
    let lastRemoteSessionId = "";
    let lastRemoteSnapshotRevision = 0;
    let lastRemotePlaybackRevision = 0;
    let playbackAnchorProgress = 0;
    let playbackAnchorAt = Date.now();
    let preferredOutputDisplayId = "";
    let selectedOutputDisplayId = "";
    let lastOutputWidth = 0;
    let lastOutputHeight = 0;
    let outputStatusRefreshPending = false;
    let statusToastTimer = 0;

    if (isOutputMode) {
      document.body.classList.add("output-mode");
    }

    if (!window.teleprompterBridge && window.__TAURI__?.core?.invoke) {
      const tauriInvoke = window.__TAURI__.core.invoke;
      const tauriListen = window.__TAURI__.event?.listen;
      window.teleprompterBridge = {
        toggleOutputWindow: (displayId) => tauriInvoke("toggle_output_window", { displayId: displayId || null }),
        closeOutputWindow: () => tauriInvoke("close_output_window"),
        getOutputStatus: () => tauriInvoke("get_output_status"),
        selectOutputDisplay: (displayId) => tauriInvoke("select_output_display", { displayId }),
        outputWindowReady: () => tauriInvoke("output_window_ready"),
        sendState: (state) => {
          tauriInvoke("teleprompter_state", { state }).catch(() => {});
        },
        onState: (callback) => {
          tauriListen?.("teleprompter-state", (event) => callback(event.payload));
        },
        onOutputStatus: (callback) => {
          tauriListen?.("output-window-status", (event) => callback(event.payload));
        },
      };
    }

    // 非桌面壳环境（普通浏览器）：标记为网页预览版，
    // 启用顶部提示条并隐藏依赖原生第二屏窗口的功能。
    if (!window.teleprompterBridge && !window.webkit?.messageHandlers?.nativeFullscreen) {
      document.body.classList.add("web-preview");
      const banner = document.getElementById("webBanner");
      if (banner) {
        banner.setAttribute("aria-hidden", "false");
      }
    }

    const defaultState = {
      text: elements.input.value,
      speed: 42,
      size: 64,
      line: 91,
      lineMode: "lineBox",
      spacing: 0,
      width: 84,
      offset: 0,
      guide: 50,
      controlHeight: 145,
      mirrorX: true,
      mirrorY: false,
      displayMode: "dark",
      editorOpen: false,
      outputDisplayId: ""
    };

    function loadState() {
      try {
        return { ...defaultState, ...JSON.parse(localStorage.getItem(storageKey) || "{}") };
      } catch {
        return defaultState;
      }
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeLineStep(value, fontSize = defaultState.size, mode = defaultState.lineMode) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) {
        return defaultState.line;
      }
      if (mode === "lineBox") {
        return numeric;
      }
      if (numeric > 120) {
        return Math.round(Math.max(1, (numeric / 100) * fontSize));
      }
      return Math.round(Math.max(1, fontSize + numeric));
    }

    function getControlBounds() {
      const viewportHeight = window.innerHeight;
      const minHeight = window.innerWidth < 720 ? 164 : 128;
      const maxHeight = Math.max(minHeight, Math.round(viewportHeight * .4));
      return { minHeight, maxHeight };
    }

    function getControlHeight() {
      return Math.round(elements.controlPanel.getBoundingClientRect().height);
    }

    function setControlHeight(height, persist = true) {
      const { minHeight, maxHeight } = getControlBounds();
      const nextHeight = clamp(Math.round(height), minHeight, maxHeight);
      elements.app.style.setProperty("--control-height", `${nextHeight}px`);
      requestAnimationFrame(() => resizePreviewSurface(true));
      if (persist) {
        saveState();
      }
    }

    function resizePreviewSurface(preserveProgress = true, preservedProgress = null, immediate = false) {
      if (!elements.previewSurface) {
        return;
      }
      const progress = preserveProgress
        ? (Number.isFinite(preservedProgress) ? preservedProgress : getScrollProgress())
        : 0;
      const rect = elements.stage.getBoundingClientRect();
      const scale = Math.min(rect.width / previewBaseWidth, rect.height / previewBaseHeight);
      elements.previewSurface.style.setProperty("--preview-scale", Math.max(0.01, scale));
      const applyProgress = () => {
        resizeFrame = 0;
        if (preserveProgress) {
          setScrollY(getScrollYFromProgress(progress));
        } else {
          updateProgress();
        }
      };

      if (resizeFrame) {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = 0;
      }
      if (immediate) {
        applyProgress();
      } else {
        resizeFrame = requestAnimationFrame(applyProgress);
      }
    }

    function setPreviewBaseSize(width, height, preserveProgress = true) {
      const numericWidth = Number(width);
      const numericHeight = Number(height);
      if (!Number.isFinite(numericWidth) || !Number.isFinite(numericHeight) || numericWidth <= 0 || numericHeight <= 0) {
        return;
      }

      const nextHeight = 720;
      const nextWidth = Math.max(1, Math.round(nextHeight * numericWidth / numericHeight));
      if (nextWidth === previewBaseWidth && nextHeight === previewBaseHeight) {
        resizePreviewSurface(preserveProgress);
        return;
      }

      const progress = preserveProgress ? getScrollProgress() : 0;
      previewBaseWidth = nextWidth;
      previewBaseHeight = nextHeight;
      elements.previewSurface.style.setProperty("--preview-base-width", `${previewBaseWidth}px`);
      elements.previewSurface.style.setProperty("--preview-base-height", `${previewBaseHeight}px`);
      resizePreviewSurface(preserveProgress, progress);
    }

    function saveState() {
      if (isOutputMode || applyingRemoteState) {
        return;
      }
      const state = {
        text: elements.input.value,
        speed: Number(elements.speedRange.value),
        size: Number(elements.sizeRange.value),
        line: Number(elements.lineRange.value),
        lineMode: "lineBox",
        spacing: Number(elements.spacingRange.value),
        width: Number(elements.widthRange.value),
        offset: Number(elements.offsetRange.value),
        guide: Number(elements.guideRange.value),
        controlHeight: getControlHeight(),
        mirrorX: mirrorX === -1,
        mirrorY: mirrorY === -1,
        displayMode,
        editorOpen: elements.scriptDrawer.classList.contains("open"),
        outputDisplayId: preferredOutputDisplayId
      };
      localStorage.setItem(storageKey, JSON.stringify(state));
      elements.saveStatus.textContent = "已自动保存";
    }

    function getScreenMirrorX() {
      return outputActive && !isOutputMode ? 1 : mirrorX;
    }

    function getScreenMirrorY() {
      return outputActive && !isOutputMode ? 1 : mirrorY;
    }

    function setDisplayMode(mode) {
      displayMode = mode === "light" ? "light" : "dark";
      document.body.classList.toggle("display-light", displayMode === "light");
      document.body.classList.toggle("display-dark", displayMode === "dark");
      elements.darkModeButton?.setAttribute("aria-pressed", String(displayMode === "dark"));
      elements.lightModeButton?.setAttribute("aria-pressed", String(displayMode === "light"));
    }

    function setOutputActive(active) {
      const nextActive = Boolean(active);
      const changed = nextActive !== outputActive;
      outputActive = nextActive;
      elements.outputButton?.setAttribute("aria-pressed", String(outputActive));
      if (elements.outputLabel) {
        elements.outputLabel.textContent = outputActive ? "关闭第二屏" : "第二屏输出";
      }
      if (!changed) {
        return;
      }
      updateMirrorNote();
      applyControls();
      publishState(true);
    }

    function showStatusToast(message) {
      if (!elements.statusToast || !message || isOutputMode) {
        return;
      }
      window.clearTimeout(statusToastTimer);
      elements.statusToast.textContent = message;
      elements.statusToast.classList.add("visible");
      elements.statusToast.setAttribute("aria-hidden", "false");
      statusToastTimer = window.setTimeout(() => {
        elements.statusToast.classList.remove("visible");
        elements.statusToast.setAttribute("aria-hidden", "true");
      }, 3600);
    }

    function renderOutputDisplays(status) {
      if (!elements.outputDisplayPicker || !elements.outputDisplaySelect || !Array.isArray(status?.displays)) {
        return;
      }

      const displays = status.displays;
      const currentSignature = Array.from(elements.outputDisplaySelect.options)
        .map((option) => `${option.value}:${option.textContent}`)
        .join("|");
      const nextSignature = displays.map((display, index) => {
        const name = display.name || `显示器 ${index + 1}`;
        const resolution = display.width && display.height ? ` · ${display.width}×${display.height}` : "";
        const primary = display.isPrimary ? "（主屏）" : "";
        return `${display.id}:${name}${resolution}${primary}`;
      }).join("|");

      if (currentSignature !== nextSignature) {
        elements.outputDisplaySelect.replaceChildren(...displays.map((display, index) => {
          const option = document.createElement("option");
          option.value = String(display.id);
          const name = display.name || `显示器 ${index + 1}`;
          const resolution = display.width && display.height ? ` · ${display.width}×${display.height}` : "";
          option.textContent = `${name}${resolution}${display.isPrimary ? "（主屏）" : ""}`;
          return option;
        }));
      }

      selectedOutputDisplayId = status.selectedDisplayId ? String(status.selectedDisplayId) : "";
      if (selectedOutputDisplayId && displays.some((display) => String(display.id) === selectedOutputDisplayId)) {
        elements.outputDisplaySelect.value = selectedOutputDisplayId;
      }
      elements.outputDisplayPicker.hidden = displays.length < 2;
    }

    function applyOutputStatus(status) {
      renderOutputDisplays(status);
      if (status?.notice === "display-disconnected" || status?.notice === "display-unavailable") {
        preferredOutputDisplayId = "";
        saveState();
        showStatusToast(status.notice === "display-disconnected"
          ? "输出显示器已断开，第二屏输出已自动关闭"
          : "所选显示器当前不可用，已切换到可用屏幕");
      }
      if (status?.outputWidth && status?.outputHeight
        && (Number(status.outputWidth) !== lastOutputWidth || Number(status.outputHeight) !== lastOutputHeight)) {
        lastOutputWidth = Number(status.outputWidth);
        lastOutputHeight = Number(status.outputHeight);
        setPreviewBaseSize(status.outputWidth, status.outputHeight, true);
      }
      setOutputActive(Boolean(status?.opened));
    }

    async function refreshOutputStatus() {
      if (isOutputMode || outputStatusRefreshPending || !window.teleprompterBridge?.getOutputStatus) {
        return;
      }
      outputStatusRefreshPending = true;
      try {
        applyOutputStatus(await window.teleprompterBridge.getOutputStatus());
      } catch {
        // 桌面壳退出或重载时无需向用户展示轮询错误。
      } finally {
        outputStatusRefreshPending = false;
      }
    }

    async function initializeOutputDisplays() {
      if (isOutputMode || !window.teleprompterBridge) {
        return;
      }
      try {
        const status = preferredOutputDisplayId && window.teleprompterBridge.selectOutputDisplay
          ? await window.teleprompterBridge.selectOutputDisplay(preferredOutputDisplayId)
          : await window.teleprompterBridge.getOutputStatus?.();
        if (status) {
          applyOutputStatus(status);
        }
      } catch {
        showStatusToast("暂时无法读取显示器信息");
      }
      if (window.teleprompterBridge.getOutputStatus) {
        window.setInterval(refreshOutputStatus, 2000);
      }
    }

    async function selectOutputDisplay() {
      const displayId = elements.outputDisplaySelect?.value;
      if (!displayId || !window.teleprompterBridge?.selectOutputDisplay) {
        return;
      }
      preferredOutputDisplayId = displayId;
      saveState();
      try {
        applyOutputStatus(await window.teleprompterBridge.selectOutputDisplay(displayId));
      } catch {
        showStatusToast("切换输出显示器失败");
        await refreshOutputStatus();
      }
      elements.stage.focus({ preventScroll: true });
    }

    function updateMirrorNote() {
      if (!elements.mirrorNote) {
        return;
      }
      if ((mirrorX === 1 && mirrorY === 1)) {
        elements.mirrorNote.textContent = "";
      } else if (outputActive && !isOutputMode) {
        elements.mirrorNote.textContent = "镜像仅作用于第二屏，主屏保持正常显示";
      } else {
        elements.mirrorNote.textContent = "镜像正在作用于当前提词画面";
      }
    }

    function updateEmptyState() {
      document.body.classList.toggle("empty-script", elements.input.value.trim().length === 0);
    }

    function updateReadingStats() {
      const compact = elements.input.value.replace(/\s/g, "");
      const minutes = Math.max(1, Math.ceil(compact.length / 300));
      elements.stats.textContent = `${compact.length} 字`;
      elements.readingTime.textContent = compact.length ? `约 ${minutes} 分钟` : "约 0 分钟";
    }

    function renderScriptText(text) {
      const displayText = text.trim() || "点击下方“稿件”输入文字，或“读取”导入文档";
      elements.text.textContent = displayText;
    }

    function getSnapshotState() {
      return {
        text: elements.input.value,
        size: Number(elements.sizeRange.value),
        line: Number(elements.lineRange.value),
        lineMode: "lineBox",
        spacing: Number(elements.spacingRange.value),
        width: Number(elements.widthRange.value),
        offset: Number(elements.offsetRange.value),
        guide: Number(elements.guideRange.value),
        displayMode,
        mirrorX: mirrorX === -1,
        mirrorY: mirrorY === -1,
        previewWidth: previewBaseWidth,
        previewHeight: previewBaseHeight
      };
    }

    function setPlaybackAnchor(progress = getScrollProgress(), anchorAt = Date.now()) {
      playbackAnchorProgress = clamp(Number(progress) || 0, 0, 1);
      playbackAnchorAt = Number.isFinite(Number(anchorAt)) ? Number(anchorAt) : Date.now();
    }

    function getPlaybackProgress(now = Date.now()) {
      if (!playing) {
        return playbackAnchorProgress;
      }
      const scrollDistance = Math.max(1, Math.abs(getEndScrollY() - getStartScrollY()));
      const elapsedSeconds = Math.max(0, Number(now) - playbackAnchorAt) / 1000;
      const speed = Number(elements.speedRange.value) || defaultState.speed;
      return clamp(playbackAnchorProgress + speed * elapsedSeconds / scrollDistance, 0, 1);
    }

    function getPlaybackState(anchorAt = Date.now()) {
      return {
        progress: getScrollProgress(),
        playing,
        speed: Number(elements.speedRange.value),
        anchorAt
      };
    }

    function publishState(force = false) {
      if (isOutputMode || applyingRemoteState || !window.teleprompterBridge?.sendState) {
        return;
      }

      const snapshot = getSnapshotState();
      const snapshotSignature = JSON.stringify(snapshot);
      if (snapshotSignature !== lastSnapshotSignature) {
        lastSnapshotSignature = snapshotSignature;
        snapshotRevision += 1;
        window.teleprompterBridge.sendState({
          kind: "snapshot",
          protocolVersion: 1,
          sessionId: syncSessionId,
          revision: snapshotRevision,
          state: snapshot
        });
      }

      if (playing && !force) {
        return;
      }

      const anchorAt = Date.now();
      setPlaybackAnchor(getScrollProgress(), anchorAt);
      playbackRevision += 1;
      window.teleprompterBridge.sendState({
        kind: "playback",
        protocolVersion: 1,
        sessionId: syncSessionId,
        revision: playbackRevision,
        state: getPlaybackState(anchorAt)
      });
    }

    function applyRemoteSnapshot(state) {
      if (!state) {
        return;
      }
      applyingRemoteState = true;
      setPreviewBaseSize(state.previewWidth, state.previewHeight, false);
      elements.input.value = state.text ?? "";
      elements.sizeRange.value = state.size ?? defaultState.size;
      elements.lineRange.value = normalizeLineStep(state.line ?? defaultState.line, state.size ?? defaultState.size, state.lineMode);
      elements.spacingRange.value = state.spacing ?? defaultState.spacing;
      elements.widthRange.value = state.width ?? defaultState.width;
      elements.offsetRange.value = state.offset ?? defaultState.offset;
      elements.guideRange.value = state.guide ?? defaultState.guide;
      setDisplayMode(state.displayMode ?? defaultState.displayMode);
      mirrorX = state.mirrorX ? -1 : 1;
      mirrorY = state.mirrorY ? -1 : 1;
      updateText();
      applyControls();
      requestAnimationFrame(() => {
        setScrollY(getScrollYFromProgress(getPlaybackProgress()), false);
        applyingRemoteState = false;
      });
    }

    function updatePlayingUi() {
      elements.playLabel.textContent = playing ? "暂停" : "开始";
      elements.playIcon.innerHTML = playing
        ? '<path d="M7 5h4v14H7z"></path><path d="M13 5h4v14h-4z"></path>'
        : '<path d="M8 5v14l11-7z"></path>';
      elements.playButton.classList.toggle("primary", !playing);
    }

    function applyRemotePlayback(state) {
      if (!state) {
        return;
      }
      applyingRemoteState = true;
      const speed = clamp(Number(state.speed) || defaultState.speed, Number(elements.speedRange.min), Number(elements.speedRange.max));
      elements.speedRange.value = String(speed);
      elements.speedValue.textContent = String(speed);
      playing = Boolean(state.playing);
      setPlaybackAnchor(state.progress, state.anchorAt);
      updatePlayingUi();
      requestAnimationFrame(() => {
        setScrollY(getScrollYFromProgress(getPlaybackProgress(Date.now())), false);
        applyingRemoteState = false;
      });
    }

    function applyRemoteState(message) {
      if (!isOutputMode || !message) {
        return;
      }

      if (message.sessionId && message.sessionId !== lastRemoteSessionId) {
        lastRemoteSessionId = message.sessionId;
        lastRemoteSnapshotRevision = 0;
        lastRemotePlaybackRevision = 0;
      }

      if (message.kind === "snapshot") {
        const revision = Number(message.revision) || 0;
        if (revision && revision <= lastRemoteSnapshotRevision) {
          return;
        }
        lastRemoteSnapshotRevision = revision || lastRemoteSnapshotRevision;
        applyRemoteSnapshot(message.state);
        return;
      }

      if (message.kind === "playback") {
        const revision = Number(message.revision) || 0;
        if (revision && revision <= lastRemotePlaybackRevision) {
          return;
        }
        lastRemotePlaybackRevision = revision || lastRemotePlaybackRevision;
        applyRemotePlayback(message.state);
        return;
      }

      // Accept the pre-v1 full-state payload during rolling upgrades.
      applyRemoteSnapshot(message);
      applyRemotePlayback({
        progress: typeof message.progress === "number" ? message.progress : 0,
        playing: message.playing,
        speed: message.speed,
        anchorAt: Date.now()
      });
    }

    function updateText() {
      // 编辑会改变内容高度，先记下当前播放进度，渲染后恢复到等效位置；
      // 远程快照有自己的定位流程，跳过恢复（镜像模式下此前会错误地把第二屏重置回顶部）
      const preservedProgress = applyingRemoteState ? null : getPlaybackProgress();
      renderScriptText(elements.input.value);
      updateReadingStats();
      updateEmptyState();
      elements.saveStatus.textContent = "正在保存...";
      if (preservedProgress !== null) {
        setPlaybackAnchor(preservedProgress);
        // 最后一行输入的高度要等下一帧才稳定，恢复也放到第二帧执行
        requestAnimationFrame(() => requestAnimationFrame(() => {
          setScrollY(getScrollYFromProgress(preservedProgress));
        }));
      }
      window.clearTimeout(updateText.saveTimer);
      updateText.saveTimer = window.setTimeout(saveState, 180);
      publishState(true);
    }

    function applyControls() {
      const preservedProgress = getScrollProgress();
      const fontSize = Number(elements.sizeRange.value);
      const lineMin = Math.max(Number(elements.sizeRange.min) || 28, Math.round(fontSize));
      const lineMax = Number(elements.lineRange.max) || 180;
      const lineSetting = clamp(normalizeLineStep(elements.lineRange.value, fontSize, "lineBox"), lineMin, lineMax);
      const lineHeight = lineSetting / Math.max(1, fontSize);
      const spacing = Number(elements.spacingRange.value);
      const width = Number(elements.widthRange.value);
      const offset = Number(elements.offsetRange.value);
      const guide = Number(elements.guideRange.value);

      elements.text.style.setProperty("--script-size", `${fontSize}px`);
      elements.text.style.setProperty("--script-line-height", lineHeight);
      elements.text.style.setProperty("--script-spacing", `${spacing}px`);
      elements.text.style.setProperty("--script-offset-x", `${offset}vw`);
      elements.stage.style.setProperty("--guide-top", `${guide}%`);
      elements.lineRange.min = String(lineMin);
      elements.lineRange.value = String(lineSetting);
      elements.text.style.left = `${(100 - width) / 2}%`;
      elements.text.style.right = `${(100 - width) / 2}%`;
      elements.speedValue.textContent = elements.speedRange.value;
      elements.sizeValue.textContent = elements.sizeRange.value;
      elements.lineValue.textContent = `${lineSetting}px`;
      elements.spacingValue.textContent = spacing === 0 ? "0" : `${spacing}px`;
      elements.widthValue.textContent = `${width}%`;
      elements.offsetValue.textContent = offset === 0 ? "0" : `${offset}vw`;
      elements.guideValue.textContent = `${guide}%`;
      elements.text.style.setProperty("--mirror-x", getScreenMirrorX());
      elements.text.style.setProperty("--mirror-y", getScreenMirrorY());
      elements.outputRemaining?.style.setProperty("--mirror-x", getScreenMirrorX());
      elements.outputRemaining?.style.setProperty("--mirror-y", getScreenMirrorY());
      elements.outputRemaining?.classList.toggle("mirrored-y", getScreenMirrorY() === -1);
      elements.mirrorXButton.setAttribute("aria-pressed", String(mirrorX === -1));
      elements.mirrorYButton.setAttribute("aria-pressed", String(mirrorY === -1));
      elements.browseRange?.classList.toggle("mirrored-order", isBrowseProgressMirrored());
      setDisplayMode(displayMode);
      updateMirrorNote();
      resizePreviewSurface(true, preservedProgress, true);
      requestAnimationFrame(updateProgress);
      saveState();
      publishState(true);
    }

    function setPlaying(nextPlaying) {
      const now = Date.now();
      if (playing) {
        setScrollY(getScrollYFromProgress(getPlaybackProgress(now)), false);
      }
      playing = Boolean(nextPlaying);
      setPlaybackAnchor(getScrollProgress(), now);
      updatePlayingUi();
      publishState(true);
      // 播放 / 暂停按钮是高频控件，操作后把焦点交回预览区，让方向键等播放快捷键保持可用
      if (!isOutputMode && document.activeElement === elements.playButton) {
        elements.stage.focus({ preventScroll: true });
      }
    }

    function getMirroredScrollY(value) {
      return -elements.text.offsetHeight - value;
    }

    function getStartScrollY() {
      return getScreenMirrorY() === -1 ? -elements.text.offsetHeight : 0;
    }

    function getEndScrollY() {
      return getScreenMirrorY() === -1 ? 0 : -elements.text.offsetHeight;
    }

    function getScrollProgress() {
      const textHeight = elements.text.offsetHeight;
      if (!textHeight) {
        return 0;
      }
      const start = getStartScrollY();
      const end = getEndScrollY();
      return start === end ? 0 : clamp((scrollY - start) / (end - start), 0, 1);
    }

    function getScrollYFromProgress(progress) {
      const nextProgress = clamp(Number(progress) || 0, 0, 1);
      const start = getStartScrollY();
      const end = getEndScrollY();
      return start + (end - start) * nextProgress;
    }

    function updateProgress() {
      const progress = getScrollProgress();
      const percent = Math.round(progress * 100);
      const browsePercent = getBrowseSliderPercent(percent);
      elements.progressFill.style.width = `${percent}%`;
      elements.progressValue.textContent = `${percent}%`;
      elements.stage.style.setProperty("--guide-progress", `${getGuideProgressPercent(percent)}%`);
      if (!seekingProgress && elements.browseRange) {
        elements.browseRange.value = String(browsePercent);
      }
      if (elements.browseValue) {
        elements.browseValue.textContent = `${percent}%`;
      }
      updateOutputRemaining(progress);
    }

    function getCompactLength() {
      return elements.input.value.replace(/\s/g, "").length;
    }

    function getPreviewScale() {
      const rect = elements.previewSurface.getBoundingClientRect();
      return rect.width / Math.max(1, elements.previewSurface.offsetWidth);
    }

    function updateOutputRemaining(progress = getScrollProgress()) {
      if (!elements.outputRemaining) {
        return;
      }
      const total = getCompactLength();
      const remaining = Math.max(0, Math.round(total * (1 - clamp(progress, 0, 1))));
      elements.outputRemaining.textContent = `剩余 ${remaining} 字`;
    }

    function isBrowseProgressMirrored() {
      return getScreenMirrorX() !== getScreenMirrorY();
    }

    function getGuideProgressPercent(percent) {
      return getScreenMirrorX() === -1 ? 100 - percent : percent;
    }

    function getBrowseSliderPercent(percent) {
      return isBrowseProgressMirrored() ? percent : 100 - percent;
    }

    function getProgressFromBrowseSlider(value) {
      const percent = clamp(Number(value) || 0, 0, 100);
      return isBrowseProgressMirrored() ? percent : 100 - percent;
    }

    function setScrollY(value, shouldPublish = true) {
      const start = getStartScrollY();
      const end = getEndScrollY();
      scrollY = clamp(value, Math.min(start, end), Math.max(start, end));
      // 暂停时滚动位置就是播放锚点，避免后续基于锚点的计算（编辑恢复等）用过期值
      if (!playing && !applyingRemoteState) {
        playbackAnchorProgress = getScrollProgress();
        playbackAnchorAt = Date.now();
      }
      elements.text.style.setProperty("--scroll-y", `${scrollY}px`);
      updateProgress();
      if (shouldPublish) {
        publishState();
      }
    }

    function resetScroll() {
      setScrollY(getStartScrollY());
      elements.stage.focus({ preventScroll: true });
    }

    function seekToProgress(percent) {
      const nextProgress = clamp(Number(percent) || 0, 0, 100) / 100;
      setScrollY(getScrollYFromProgress(nextProgress));
      elements.stage.focus({ preventScroll: true });
    }

    function goToEnd() {
      seekToProgress(100);
    }

    function nudgeScrollByKeyboard(direction, fast = false) {
      const lineStep = Number(elements.lineRange.value) || Number(elements.sizeRange.value) || defaultState.size;
      const amount = lineStep * (fast ? 3 : 1);
      setScrollY(scrollY + direction * amount);
      // 播放中锚点是动画循环的唯一进度来源，手动调整必须同步锚点，否则下一帧就被拉回去
      setPlaybackAnchor(getScrollProgress());
    }

    function nudgeSpeedByKeyboard(direction, fast = false) {
      const step = fast ? 10 : 2;
      const nextSpeed = clamp(Number(elements.speedRange.value) + direction * step, Number(elements.speedRange.min), Number(elements.speedRange.max));
      elements.speedRange.value = String(nextSpeed);
      applyControls();
    }

    function setEditorOpen(open) {
      elements.scriptDrawer.classList.toggle("open", open);
      elements.toggleEditorButton.setAttribute("aria-expanded", String(open));
      revealFullscreenControls();
      saveState();
      if (open) {
        window.setTimeout(() => elements.input.focus(), 160);
      } else {
        elements.stage.focus({ preventScroll: true });
      }
    }

    function closeEditorFromStage(event) {
      if (!elements.scriptDrawer.classList.contains("open")) {
        return;
      }
      if (event.target.closest?.(".empty-actions, .stage-progress")) {
        return;
      }
      setEditorOpen(false);
    }

    function revealFullscreenControls() {
      elements.app.classList.remove("controls-collapsed");
      if (fullscreenCollapseTimer) {
        window.clearTimeout(fullscreenCollapseTimer);
      }
      const fullscreenActive = document.fullscreenElement || elements.app.classList.contains("fullscreen-fallback");
      if (fullscreenActive && !elements.scriptDrawer.classList.contains("open") && !resizing) {
        fullscreenCollapseTimer = window.setTimeout(() => {
          if (elements.controlPanel.matches(":hover") || elements.controlPanel.contains(document.activeElement)) {
            revealFullscreenControls();
            return;
          }
          elements.app.classList.add("controls-collapsed");
        }, 2600);
      }
    }

    function handleFullscreenPointerMove(event) {
      if (!document.fullscreenElement && !elements.app.classList.contains("fullscreen-fallback")) {
        return;
      }
      if (window.innerHeight - event.clientY < 96 || elements.controlPanel.matches(":hover")) {
        revealFullscreenControls();
      }
    }

    function setFullscreenMode(active) {
      elements.app.classList.toggle("fullscreen-mode", active);
      elements.app.classList.remove("controls-collapsed");
      if (active) {
        revealFullscreenControls();
      } else if (fullscreenCollapseTimer) {
        window.clearTimeout(fullscreenCollapseTimer);
      }
    }

    function animate() {
      if (playing) {
        const progress = getPlaybackProgress(Date.now());
        setScrollY(getScrollYFromProgress(progress), false);
        if (progress >= 1) {
          setPlaying(false);
        }
      }

      requestAnimationFrame(animate);
    }

    async function toggleFullscreen() {
      if (window.webkit?.messageHandlers?.nativeFullscreen) {
        window.webkit.messageHandlers.nativeFullscreen.postMessage("toggle");
        setFullscreenMode(!elements.app.classList.contains("fullscreen-mode"));
        return;
      }

      if (!document.fullscreenElement && !elements.app.classList.contains("fullscreen-fallback")) {
        try {
          await elements.app.requestFullscreen();
          if (!document.fullscreenElement) {
            elements.app.classList.add("fullscreen-fallback");
            setFullscreenMode(true);
          }
        } catch {
          elements.app.classList.add("fullscreen-fallback");
          setFullscreenMode(true);
        }
      } else {
        elements.app.classList.remove("fullscreen-fallback");
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          setFullscreenMode(false);
        }
      }
    }

    async function toggleOutputWindow() {
      if (!window.teleprompterBridge?.toggleOutputWindow) {
        return;
      }
      const result = await window.teleprompterBridge.toggleOutputWindow(preferredOutputDisplayId || undefined);
      applyOutputStatus(result);
      if (!isOutputMode) {
        elements.stage.focus({ preventScroll: true });
      }
      window.setTimeout(() => {
        if (!isOutputMode) {
          elements.stage.focus({ preventScroll: true });
        }
        publishState(true);
      }, 220);
    }

    function startResize(event) {
      event.preventDefault();
      resizing = true;
      document.body.classList.add("resizing-controls");
      elements.resizeHandle.setPointerCapture?.(event.pointerId);
      revealFullscreenControls();
    }

    function updateResize(event) {
      if (!resizing) {
        return;
      }
      const nextHeight = window.innerHeight - event.clientY;
      setControlHeight(nextHeight, false);
    }

    function stopResize(event) {
      if (!resizing) {
        return;
      }
      resizing = false;
      document.body.classList.remove("resizing-controls");
      elements.resizeHandle.releasePointerCapture?.(event.pointerId);
      setControlHeight(getControlHeight(), true);
      revealFullscreenControls();
    }

    function decodeXmlEntities(value) {
      const textarea = document.createElement("textarea");
      textarea.innerHTML = value;
      return textarea.value;
    }

    function normalizeImportedText(text) {
      return text.replace(/^\uFEFF/, "").replace(/\r\n?/g, "\n");
    }

    function extractDocxText(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const paragraphs = [...xml.getElementsByTagNameNS("*", "p")];
      return paragraphs.map((paragraph) => {
        const pieces = [];
        const walker = document.createTreeWalker(paragraph, NodeFilter.SHOW_ELEMENT);
        while (walker.nextNode()) {
          const node = walker.currentNode;
          const name = node.localName;
          if (name === "t") {
            pieces.push(node.textContent);
          } else if (name === "tab") {
            pieces.push("\t");
          } else if (name === "br" || name === "cr") {
            pieces.push("\n");
          }
        }
        return pieces.join("").trimEnd();
      }).join("\n");
    }

    async function inflateRaw(bytes) {
      if (!("DecompressionStream" in window)) {
        throw new Error("当前浏览器不支持直接读取 docx 压缩内容");
      }
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    function readZipDirectory(data) {
      const view = new DataView(data.buffer, data.byteOffset, data.byteLength);
      let eocdOffset = -1;
      for (let index = data.length - 22; index >= Math.max(0, data.length - 66000); index -= 1) {
        if (view.getUint32(index, true) === 0x06054b50) {
          eocdOffset = index;
          break;
        }
      }
      if (eocdOffset < 0) {
        throw new Error("无法识别 docx 文件结构");
      }

      const decoder = new TextDecoder();
      const entryCount = view.getUint16(eocdOffset + 10, true);
      let offset = view.getUint32(eocdOffset + 16, true);
      const entries = new Map();

      for (let i = 0; i < entryCount; i += 1) {
        if (view.getUint32(offset, true) !== 0x02014b50) {
          throw new Error("docx 目录读取失败");
        }
        const method = view.getUint16(offset + 10, true);
        const compressedSize = view.getUint32(offset + 20, true);
        const fileNameLength = view.getUint16(offset + 28, true);
        const extraLength = view.getUint16(offset + 30, true);
        const commentLength = view.getUint16(offset + 32, true);
        const localHeaderOffset = view.getUint32(offset + 42, true);
        const nameBytes = data.subarray(offset + 46, offset + 46 + fileNameLength);
        entries.set(decoder.decode(nameBytes), { method, compressedSize, localHeaderOffset });
        offset += 46 + fileNameLength + extraLength + commentLength;
      }

      return entries;
    }

    async function readZipEntry(data, entry) {
      const view = new DataView(data.buffer, data.byteOffset, data.byteLength);
      const offset = entry.localHeaderOffset;
      if (view.getUint32(offset, true) !== 0x04034b50) {
        throw new Error("docx 内容读取失败");
      }
      const fileNameLength = view.getUint16(offset + 26, true);
      const extraLength = view.getUint16(offset + 28, true);
      const start = offset + 30 + fileNameLength + extraLength;
      const bytes = data.subarray(start, start + entry.compressedSize);
      if (entry.method === 0) {
        return bytes;
      }
      if (entry.method === 8) {
        return inflateRaw(bytes);
      }
      throw new Error("不支持该 docx 压缩格式");
    }

    async function readDocx(file) {
      const data = new Uint8Array(await file.arrayBuffer());
      const entries = readZipDirectory(data);
      const documentEntry = entries.get("word/document.xml");
      if (!documentEntry) {
        throw new Error("没有找到 docx 正文");
      }
      const xmlBytes = await readZipEntry(data, documentEntry);
      return extractDocxText(new TextDecoder("utf-8").decode(xmlBytes));
    }

    async function readPlainText(file) {
      const bytes = new Uint8Array(await file.arrayBuffer());
      // 先按 UTF-8 严格解码，失败时按 GB18030 处理（Windows 记事本默认的 ANSI 编码）
      try {
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      } catch {
        try {
          return new TextDecoder("gb18030").decode(bytes);
        } catch {
          return new TextDecoder("utf-8").decode(bytes);
        }
      }
    }

    async function importFile(file) {
      if (!file || isOutputMode) {
        return;
      }
      elements.saveStatus.textContent = `正在读取 ${file.name}`;
      const ext = file.name.split(".").pop().toLowerCase();
      try {
        const text = ext === "docx" ? await readDocx(file) : await readPlainText(file);
        elements.input.value = normalizeImportedText(text);
        updateText();
        resetScroll();
        // Publish after the scroll reset so the output window receives the new text and its matching position together.
        publishState(true);
        window.requestAnimationFrame(() => publishState(true));
        elements.saveStatus.textContent = `已读取 ${file.name}`;
      } catch (error) {
        elements.saveStatus.textContent = error.message || "读取失败";
      } finally {
        elements.fileInput.value = "";
      }
    }

    function setDragActive(active) {
      elements.dropZone.classList.toggle("visible", active);
      elements.dropZone.setAttribute("aria-hidden", String(!active));
    }

    function hasDraggedFile(event) {
      return [...(event.dataTransfer?.types || [])].includes("Files");
    }

    function handleDragEnter(event) {
      if (!hasDraggedFile(event)) {
        return;
      }
      event.preventDefault();
      dragDepth += 1;
      setDragActive(true);
    }

    function handleDragOver(event) {
      if (!hasDraggedFile(event)) {
        return;
      }
      event.preventDefault();
      event.dataTransfer.dropEffect = "copy";
    }

    function handleDragLeave(event) {
      if (!hasDraggedFile(event)) {
        return;
      }
      event.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) {
        setDragActive(false);
      }
    }

    function handleDrop(event) {
      if (isOutputMode || !hasDraggedFile(event)) {
        return;
      }
      event.preventDefault();
      dragDepth = 0;
      setDragActive(false);
      importFile(event.dataTransfer.files[0]);
    }

    function showTooltip(target) {
      const label = target.getAttribute("aria-label");
      if (!label) {
        return;
      }
      activeTooltipTarget = target;
      const box = target.getBoundingClientRect();
      elements.floatingTooltip.textContent = label;
      elements.floatingTooltip.classList.add("visible");
      elements.floatingTooltip.setAttribute("aria-hidden", "false");
      const tooltipBox = elements.floatingTooltip.getBoundingClientRect();
      const left = clamp(box.left + box.width / 2, tooltipBox.width / 2 + 8, window.innerWidth - tooltipBox.width / 2 - 8);
      const top = Math.max(8, box.top - tooltipBox.height - 9);
      elements.floatingTooltip.style.left = `${left}px`;
      elements.floatingTooltip.style.top = `${top}px`;
    }

    function hideTooltip() {
      activeTooltipTarget = null;
      elements.floatingTooltip.classList.remove("visible");
      elements.floatingTooltip.setAttribute("aria-hidden", "true");
    }

    function handleTooltipMouseMove(event) {
      const target = event.target.closest?.(".button.icon-only[aria-label]");
      if (target) {
        showTooltip(target);
      } else if (activeTooltipTarget) {
        hideTooltip();
      }
    }

    function hydrate() {
      const state = loadState();
      elements.input.value = state.text;
      elements.speedRange.value = state.speed;
      elements.sizeRange.value = state.size;
      elements.lineRange.value = normalizeLineStep(state.line, state.size, state.lineMode);
      elements.spacingRange.value = state.spacing ?? 0;
      elements.widthRange.value = state.width;
      elements.offsetRange.value = state.offset ?? 0;
      elements.guideRange.value = state.guide ?? defaultState.guide;
      setDisplayMode(state.displayMode ?? defaultState.displayMode);
      const storedControlHeight = Number(state.controlHeight) || defaultState.controlHeight;
      setControlHeight(Math.abs(storedControlHeight - 170) < 2 ? defaultState.controlHeight : storedControlHeight, false);
      mirrorX = state.mirrorX ? -1 : 1;
      mirrorY = state.mirrorY ? -1 : 1;
      preferredOutputDisplayId = state.outputDisplayId ? String(state.outputDisplayId) : "";
      setEditorOpen(Boolean(state.editorOpen));
      updateText();
      applyControls();
      resetScroll();
    }

    elements.input.addEventListener("input", updateText);
    [elements.speedRange, elements.sizeRange, elements.lineRange, elements.spacingRange, elements.widthRange, elements.offsetRange, elements.guideRange].forEach((control) => {
      control.addEventListener("input", applyControls);
    });
    elements.playButton.addEventListener("click", () => setPlaying(!playing));
    elements.resetButton.addEventListener("click", () => {
      resetScroll();
      publishState(true);
    });
    elements.endButton.addEventListener("click", () => {
      goToEnd();
      publishState(true);
    });
    elements.outputButton.addEventListener("click", toggleOutputWindow);
    elements.outputDisplaySelect?.addEventListener("change", selectOutputDisplay);
    elements.darkModeButton.addEventListener("click", () => {
      setDisplayMode("dark");
      saveState();
      publishState(true);
    });
    elements.lightModeButton.addEventListener("click", () => {
      setDisplayMode("light");
      saveState();
      publishState(true);
    });
    elements.browseRange.addEventListener("input", () => {
      seekingProgress = true;
      seekToProgress(getProgressFromBrowseSlider(elements.browseRange.value));
    });
    elements.browseRange.addEventListener("change", () => {
      seekingProgress = false;
      updateProgress();
      publishState(true);
    });
    elements.resizeHandle.addEventListener("pointerdown", startResize);
    elements.stage.addEventListener("click", closeEditorFromStage);
    window.addEventListener("pointermove", updateResize);
    window.addEventListener("pointerup", stopResize);
    window.addEventListener("pointercancel", stopResize);
    window.addEventListener("mousemove", handleFullscreenPointerMove);
    elements.controlPanel.addEventListener("pointerenter", revealFullscreenControls);
    elements.controlPanel.addEventListener("focusin", revealFullscreenControls);
    window.addEventListener("resize", () => {
      setControlHeight(getControlHeight(), false);
      resizePreviewSurface(true);
    });
    elements.toggleEditorButton.addEventListener("click", () => {
      setEditorOpen(!elements.scriptDrawer.classList.contains("open"));
    });
    elements.importButton.addEventListener("click", () => elements.fileInput.click());
    elements.emptyEditButton.addEventListener("click", () => setEditorOpen(true));
    elements.emptyImportButton.addEventListener("click", () => elements.fileInput.click());
    elements.fileInput.addEventListener("change", () => importFile(elements.fileInput.files[0]));
    window.addEventListener("dragenter", handleDragEnter);
    window.addEventListener("dragover", handleDragOver);
    window.addEventListener("dragleave", handleDragLeave);
    window.addEventListener("drop", handleDrop);
    document.addEventListener("mousemove", handleTooltipMouseMove);
    document.querySelectorAll(".button.icon-only[aria-label]").forEach((button) => {
      button.addEventListener("mouseover", () => showTooltip(button));
      button.addEventListener("mouseenter", () => showTooltip(button));
      button.addEventListener("mouseleave", hideTooltip);
      button.addEventListener("focus", () => showTooltip(button));
      button.addEventListener("blur", hideTooltip);
    });
    elements.closeEditorButton.addEventListener("click", () => setEditorOpen(false));
    elements.clearButton.addEventListener("click", () => {
      elements.input.value = "";
      updateText();
      resetScroll();
      elements.input.focus();
    });
    elements.mirrorXButton.addEventListener("click", () => {
      mirrorX *= -1;
      applyControls();
    });
    elements.mirrorYButton.addEventListener("click", () => {
      const nextScrollY = outputActive && !isOutputMode ? scrollY : getMirroredScrollY(scrollY);
      mirrorY *= -1;
      setScrollY(nextScrollY);
      applyControls();
    });
    document.addEventListener("fullscreenchange", () => {
      setFullscreenMode(Boolean(document.fullscreenElement));
    });
    window.addEventListener("keydown", (event) => {
      if (isOutputMode) {
        if (event.key === "Escape") {
          event.preventDefault();
          window.teleprompterBridge?.closeOutputWindow?.();
        }
        return;
      }
      // 焦点在滑块、下拉框、按钮等表单控件上时，把按键留给控件的原生行为
      const shortcutTarget = event.target;
      const editing = shortcutTarget instanceof HTMLElement
        && shortcutTarget.closest("input:not([type='range']), select, textarea, button");
      if (editing) {
        return;
      }
      if (event.code === "Space") {
        event.preventDefault();
        setPlaying(!playing);
      }
      if (event.key.toLowerCase() === "r") {
        event.preventDefault();
        resetScroll();
        publishState(true);
      }
      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
      if (event.key === "ArrowUp" || event.key === "ArrowDown") {
        event.preventDefault();
        const direction = event.key === "ArrowUp" ? 1 : -1;
        nudgeScrollByKeyboard(direction, event.shiftKey);
        publishState(true);
      }
      if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
        event.preventDefault();
        const direction = event.key === "ArrowRight" ? 1 : -1;
        nudgeSpeedByKeyboard(direction, event.shiftKey);
      }
      if (event.key === "Escape" && playing) {
        setPlaying(false);
      }
    });
    elements.stage.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = getScreenMirrorY() === -1 ? 1 : -1;
      setScrollY(scrollY + direction * event.deltaY / getPreviewScale());
      // 播放中锚点是动画循环的唯一进度来源，手动调整必须同步锚点，否则下一帧就被拉回去
      setPlaybackAnchor(getScrollProgress());
      publishState(true);
    }, { passive: false });

    hydrate();
    window.teleprompterBridge?.onState?.(applyRemoteState);
    window.teleprompterBridge?.onOutputStatus?.(applyOutputStatus);
    if (isOutputMode) {
      window.teleprompterBridge?.outputWindowReady?.();
    } else {
      initializeOutputDisplays();
    }
    publishState(true);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
